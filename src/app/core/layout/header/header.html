<header class="app-header">
  <div class="search-wrapper" [class.expanded]="isSearchExpanded()">
    <button mat-icon-button (click)="toggleSearch()" class="search-trigger">
      <mat-icon>{{ isSearchExpanded() ? 'close' : 'search' }}</mat-icon>
    </button>

    <!-- <div class="search-input-container">
      <input type="text" placeholder="Search Case No, CNR, or Client..." [(ngModel)]="searchQuery"
        (keyup.enter)="onSearchSubmit()">
    </div> -->
    <div class="search-input-container">
      <input #searchInput type="text" placeholder="Search Case No, CNR..." [(ngModel)]="searchQuery"
        (keyup.enter)="onSearchSubmit()">

      <!-- @if (searchQuery()) {
      <button mat-icon-button class="clear-btn" (click)="searchQuery.set('')">
        <mat-icon>backspace</mat-icon>
      </button>
      } -->
    </div>
  </div>

  <div class="header-right-content">

    <button mat-icon-button [matMenuTriggerFor]="notifMenu" class="notification-btn" (click)="onOpenNotifications()">
      <mat-icon>notifications_none</mat-icon>
      @if (unreadCount() > 0) {
      <span class="notification-badge">{{ unreadCount() }}</span>
      }
    </button>

    <mat-menu #notifMenu="matMenu" class="legal-notif-panel">
      <div class="notif-header" (click)="$event.stopPropagation()">
        <h3>Notifications</h3>
        <button (click)="clearHistory()">Clear All</button>
      </div>

      <div class="notif-list">
        @for (n of notifications(); track n.id) {
        <div class="notif-item" [class.unread]="!n.read">
          <div class="type-indicator" [class]="n.type"></div>
          <div class="notif-body">
            <p class="msg">{{ n.message }}</p>
            <span class="time">{{ n.timestamp | date:'shortTime' }}</span>
          </div>
        </div>
        } @empty {
        <div class="notif-empty">
          <mat-icon>notifications_paused</mat-icon>
          <p>No new alerts for today</p>
        </div>
        }
      </div>
    </mat-menu>

    <div class="vertical-divider"></div>

    <div class="profile-container">
      <div class="user-meta">
        <span class="user-name">Anmol Panwar</span>
        <span class="user-role">Founding Partner</span>
      </div>
      <div class="avatar-circle">AP</div>
    </div>
  </div>
</header>

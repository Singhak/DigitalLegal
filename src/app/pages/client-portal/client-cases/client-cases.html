<div class="cases-container">
  <div class="header-actions">
    <h1>My Cases</h1>
    <p class="subtitle">Select a case below to view documents, dates, and status updates.</p>
  </div>

  <div *ngIf="isLoading()" class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="errorMessage()" class="error-message">
    {{ errorMessage() }}
  </div>

  <div class="table-container" *ngIf="!isLoading()">
    <table mat-table [dataSource]="clientCases()" class="mat-elevation-z2">
      
      <!-- Case Number Column -->
      <ng-container matColumnDef="caseNumber">
        <th mat-header-cell *matHeaderCellDef> Case No. </th>
        <td mat-cell *matCellDef="let c"> <strong>{{c.caseNumber}}</strong> </td>
      </ng-container>
      
      <!-- CNR Number Column -->
      <ng-container matColumnDef="cnrNumber">
        <th mat-header-cell *matHeaderCellDef> CNR No. </th>
        <td mat-cell *matCellDef="let c"> {{c.cnrNumber || 'N/A'}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let c"> 
          <span class="status-badge">Active</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let c">
          <button mat-stroked-button color="primary" (click)="viewCaseDetails(c.id || c._id || 'demo')">View Details</button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="case-row" (click)="viewCaseDetails(row.id || row._id || 'demo')"></tr>
    </table>

    <div *ngIf="clientCases().length === 0" class="no-cases-msg">
      <mat-icon>folder_open</mat-icon>
      <p>You have no active cases at the moment.</p>
    </div>
  </div>
</div>

<div class="cases-container">
  <div class="header-actions">
    <h1>My Cases</h1>
    <button mat-flat-button color="primary">
      <mat-icon>add</mat-icon> New Case
    </button>
  </div>

  <div *ngIf="isLoading()" class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="errorMessage()" class="error-message">
    {{ errorMessage() }}
  </div>

  <div class="table-container" *ngIf="!isLoading()">
    <table mat-table [dataSource]="allCases()" class="mat-elevation-z2">
      
      <!-- Case Number Column -->
      <ng-container matColumnDef="caseNumber">
        <th mat-header-cell *matHeaderCellDef> Case No. </th>
        <td mat-cell *matCellDef="let c"> <strong>{{c.caseNumber}}</strong> </td>
      </ng-container>

      <!-- Client Name Column -->
      <ng-container matColumnDef="clientName">
        <th mat-header-cell *matHeaderCellDef> Client </th>
        <td mat-cell *matCellDef="let c"> {{c.clientName}} </td>
      </ng-container>
      
      <!-- CNR Number Column -->
      <ng-container matColumnDef="cnrNumber">
        <th mat-header-cell *matHeaderCellDef> CNR No. </th>
        <td mat-cell *matCellDef="let c"> {{c.cnrNumber || 'N/A'}} </td>
      </ng-container>

      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let c"> 
          <span class="status-badge">Active</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" title="View Details"><mat-icon>visibility</mat-icon></button>
          <button mat-icon-button color="accent" title="Edit Case"><mat-icon>edit</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="case-row"></tr>
    </table>

    <div *ngIf="allCases().length === 0" class="no-cases-msg">
      <mat-icon>folder_open</mat-icon>
      <p>No cases found. Click "New Case" to add one.</p>
    </div>
  </div>
</div>
